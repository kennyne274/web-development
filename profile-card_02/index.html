<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <!--Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;1,500;1,600&display=swap"
        rel="stylesheet">
    <!--css 파일 연결-->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="card-wrapper">
        <div class="card">
            <div class="top">
                <img src="man.png" alt="">
            </div>
            <div class="content">
                <h2>Ray Jang<span><i class="fa-solid fa-check"></i></span></h2>
                <p>Web Developer</p>

                <div class="tags">
                    <a href="#" class="link">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a href="#" class="link">
                        <i class="fa-brands fa-twitter"></i>
                    </a>
                    <a href="#" class="link">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" class="link">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </div>
                <div class="stats">
                    <div>
                        <h3>12k</h3>
                        <small> <i class="fa-regular fa-heart"></i></small>
                    </div>
                    <div>
                        <h3>45</h3>
                        <small> <i class="fa-regular fa-message"></i></small>
                    </div>
                    <div>
                        <h3>4.9</h3>
                        <small><i class="fa-solid fa-arrow-up-right-from-square"></i></small>
                    </div>

                </div>
                <button>Follow</button>
            </div>

        </div>
        <div class="card">
            <div class="top">
                <img src="man2.png" alt="">
            </div>
            <div class="content">
                <h2>Jay Jin<span><i class="fa-solid fa-check"></i></span></h2>
                <p>Data Analyst</p>

                <div class="tags">
                    <a href="#" class="link">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a href="#" class="link">
                        <i class="fa-brands fa-twitter"></i>
                    </a>
                    <a href="#" class="link">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" class="link">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </div>
                <div class="stats">
                    <div>
                        <h3>12k</h3>
                        <small> <i class="fa-regular fa-heart"></i></small>
                    </div>
                    <div>
                        <h3>45</h3>
                        <small> <i class="fa-regular fa-message"></i></small>
                    </div>
                    <div>
                        <h3>4.9</h3>
                        <small><i class="fa-solid fa-arrow-up-right-from-square"></i></small>
                    </div>

                </div>
                <button>Follow</button>
            </div>

        </div>
    </div>
</body>

</html>
