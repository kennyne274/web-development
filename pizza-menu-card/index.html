<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Menu Card</title>
    <!--css 파일 연결-->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section class="pizza">
        <div class="card-container">
            <div class="card">
                <div class="image">
                    <img src="https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?w=1600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cGVwZXJvbmklMjBwaXp6YXxlbnwwfHwwfHx8MA%3D%3D"
                        alt="pepperoni pizza" width="500" height="195">
                </div>
                <div class="info">
                    <div class="card-title">
                        <h3>pepperoni pizza</h3>
                        <p>Hot & Fresh</p>
                    </div>
                    <div class="price">
                        <p>$ 5</p>
                    </div>
                </div>
                <div class="btn">
                    <button class="btn-buy">Buy</button>
                    <button class="btn-cart">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <div class="image">
                    <img src="https://images.unsplash.com/photo-1724734333243-17c38ef0cdfd?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="마Margherita pizza" width="500" height="195">
                </div>
                <div class="info">
                    <div class="card-title">
                        <h3>Margherita pizza</h3>
                        <p>Hot & Fresh</p>
                    </div>
                    <div class="price">
                        <p>$ 5.7</p>
                    </div>
                </div>
                <div class="btn">
                    <button class="btn-buy">Buy</button>
                    <button class="btn-cart">Add to Cart</button>
                </div>
            </div>
            <div class="card">
                <div class="image">
                    <img src="https://images.unsplash.com/photo-1652952561151-97e82f26c336?q=80&w=2072&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="Shrimp pizza" width="500" height="195">
                </div>
                <div class="info">
                    <div class="card-title">
                        <h3>Shrimp pizza</h3>
                        <p>Hot & Fresh</p>
                    </div>
                    <div class="price">
                        <p>$ 6.3</p>
                    </div>
                </div>
                <div class="btn">
                    <button class="btn-buy">Buy</button>
                    <button class="btn-cart">Add to Cart</button>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
