<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>food-card-ui-design</title>
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <!--google font link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;1,500;1,600&display=swap"
        rel="stylesheet">
        <!--Italianno-->
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
    <!--css link-->
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="card-wrapper">
        <div class="food-card">
            <div class="food-image">
                <img src="sandwich.png" alt="햄치즈에그 샌드위치">
            </div>
            <div class="card-content">
                <h2 class="food-title">
                    Ham and Cheese Sandwich
                </h2>
                <div class="tags">
                    <span class="tag egg">egg</span>
                    <span class="tag cheese">Cheese</span>
                    <span class="tag ham">Ham</span>
                </div>

                <p class="description">
                    Our best-selling customer favorite!
                    Loaded with thick-cut ham, fresh lettuce,
                    juicy tomatoes, melted cheese, and a perfectly
                    fried egg. The ultimate breakfast choice.
                </p>

                <div class="footer">
                    <div class="price">$15</div>
                    <button class="cart-btn">
                        <i class="fa-solid fa-cart-shopping"></i> Add to cart
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
