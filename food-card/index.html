<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Cards UI</title>
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <!--google font link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;1,500;1,600&display=swap"
        rel="stylesheet">
    <!--css link-->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="card-wrapper">
        <div class="food-card">
            <div class="tag">best</div>

            <div class="food-image">
                <img src="hamburger.png" alt="Cheeseburger">
            </div>
            <p class="food-title">Cheeseburger</p>

            <div class="order">
                <p class="price">$ 5.82</p>
                <p>|</p>
                <button class="buy-btn">Order</button>
            </div>

        </div>
    </div>
</body>

</html>
