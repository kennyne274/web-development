<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈페이지 제목</title>

    <!--웹 페이지에 대한 설명을 정의-->
    <meta name="description" content="홈페이지에 대한 간단한 소개" />

    <!--검색 엔진을 위한 키워드를 정의-->
    <meta name="keywords" content="강릉, 여행, 부산">

    <!--크롤링 봇 색인 여용-->
    <meta name="robots" content="index, follow">

    <!--문서 작성자 설명-->
    <meta name="author" content="Ray">

    <!--소셜 미디어 오픈 그래프 정보-->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="페이지 제목" />
    <meta property="og:description" content="페이지 설명">
    <meta property="og:image" content="페이지 썸네일 이미지 주소" />
    <meta property="og:url" content="페이지 주소" />
    <meta property="og:site_name" content="Ray Portfolio">
    <meta property="og:locale" content="ko_KR">

    <!-- twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="타이틀" />
    <meta name="twitter:image" content="sample.jpeg(1200x630)" />
    <meta name="twitter:description" content="간단한 설명" />
    <meta name="twitter:url" content="https://sample.co.kr/" />

    <!-- Favicon 웹사이트의 작은 아이콘-->
    <link rel="icon" href="favicon.ico">

    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <!--css 파일 연결-->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!--자바 스크립트 파일 연결-->
    <script src="js/script.js"></script>
</body>

</html>
