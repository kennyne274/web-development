<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <!--구글 폰트-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;1,500;1,600&display=swap"
        rel="stylesheet">
    <!--Mrs Sheppards-->
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Sheppards&display=swap" rel="stylesheet">
    <!--css 파일 연결-->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="profile.png" alt="Portrait of Ray Jang" class="profile-image">
        </div>
        <div class="profile-info">

            <h1 class="name">Ray Jang</h1>
            <p class="job">Web developer</p>

        </div>
        <div class="media-buttons">
            <a href="#" class="link">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="#" class="link">
                <i class="fa-brands fa-twitter"></i>
            </a>
            <a href="#" class="link">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="link">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>
        <div class="analytics">
            <div class="data">
                <i class="fa-regular fa-heart"></i>
                <span class="number">50k</span>
            </div>
            <div class="data">
                <i class="fa-regular fa-message"></i>
                <span class="number">30k</span>
            </div>
            <div class="data">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                <span class="number">15k</span>
            </div>
        </div>
    </div>
</body>

</html>
