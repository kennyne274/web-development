<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products card UI Design</title>
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <!--Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;1,500;1,600&display=swap"
        rel="stylesheet">
    <!--css 파일 연결-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card-container">
        <div class="hive-card">
            <span class="category-tag">
                NEW
            </span>
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1625&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="주황색 무늬 흰색 나이키 운동화">
            <h3>나이키 운동화</h3>
            <div class="price">
                <p>84,000원</p>
            </div>
            <div class="stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star-half-stroke"></i>
                <i class="fa-regular fa-star"></i>
            </div>

            <a href="#" class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                Add to Cart
            </a>
        </div>
        <div class="hive-card">
            <span class="category-tag">
                NEW
            </span>
            <img src="https://images.unsplash.com/photo-1544441892-794166f1e3be?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="흰색 아디다스 운동화">
            <h3>아디다스 운동화</h3>
            <div class="price">
                <p>139,000원</p>
            </div>
            <div class="stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star-half-stroke"></i>
                <i class="fa-regular fa-star"></i>
            </div>

            <a href="#" class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                Add to Cart
            </a>
        </div>
        <div class="hive-card">
            <span class="category-tag">
                NEW
            </span>
            <img src="https://images.unsplash.com/photo-1611080027147-a1a0b6e05168?q=80&w=2231&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="검정색 나이키 운동화">
            <h3>나이키 운동화</h3>
            <div class="price">
                <p>84,000원</p>
            </div>
            <div class="stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star-half-stroke"></i>
                <i class="fa-regular fa-star"></i>
            </div>

            <a href="#" class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                Add to Cart
            </a>
        </div>
    </div>
</body>

</html>
